<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SIAJ</title>
    <script>
      const repo = '/siaj';
      const path = window.location.pathname.replace(repo, '');
      const search = window.location.search;
      const hash = window.location.hash;
      const url = repo + '/?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(url);
    </script>
  </head>
  <body></body>
</html>
